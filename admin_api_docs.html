> Based on actual database models in the Sakr Manning Agency backend

---

## 1. 🏠 Dashboard
**Purpose:** High-level overview / KPIs at a glance

| Widget | Data Source |
|---|---|
| Total registered seafarers | \`Users\` model (total count) |
| Active / On Site seafarers | \`Users.user_status = ON_SITE\` |
| Seafarers on Vacation | \`Users.user_status = VACATION\` |
| Seafarers on Medical Leave | \`Users.user_status = MEDICAL VACATION\` |
| Blacklisted seafarers | \`Users.is_blacklisted = True\` |
| Total CVs submitted | \`CVSubmission\` model (count) |
| Pending CV reviews | \`CVSubmission.status = Pending\` |
| Upcoming interviews | \`Interview.status = Scheduled\` (upcoming dates) |
| Total companies | \`Company\` model (count) |
| Open job positions | \`Company.open_positions\` sum OR \`JobOrder.status = Open\` |
| Documents expiring soon | \`UserLicense.expiration_date\` within 30–60 days |
| Recent registrations | Latest \`Users\` by \`created_at\` |

## 2. 📋 CVs
**Purpose:** Manage CV/profile documents uploaded for each seafarer (public applicants)
**Model:** \`Document\` | **Base URL:** \`/api/documents/\`

### Data Fields

| What to Show | Data Source |
|---|---|
| List of all CV documents | \`Document\` model (PDF/DOCX files linked to users) |
| Seafarer name + position | \`Document.name\`, \`Document.position\` |
| Document status | \`Document.status\` (Pending / Active / Blacklist) |
| Upload date | \`Document.created_at\` |
| Download/view file | \`Document.file\` (PDF or DOCX) |
| Linked user profile | \`Document.user\` → full \`Users\` record |
| generated_id | \`Users.generated_id\` — revealed only when status is \`Active\` |

> **Also relevant:** \`Users.file\` and \`Users.title\` — these are synced from documents and hold the latest file per user.

### API Endpoints

| Method | Endpoint | Description | Auth |
|---|---|---|---|
| \`GET\` | \`/api/documents/\` | List all CVs | Admin / HR / Recruiter |
| \`POST\` | \`/api/documents/\` | Upload a new CV document | **Public (no auth required)** |
| \`GET\` | \`/api/documents/{id}/\` | Get a single CV detail | Authenticated |
| \`PATCH\` | \`/api/documents/{id}/\` | Update CV fields | Authenticated |
| \`DELETE\` | \`/api/documents/{id}/\` | Delete a CV | Authenticated |
| \`POST\` | \`/api/documents/{id}/set_status/\` | Change status (Pending → Active → Blacklist) | Admin / HR / Recruiter |
| \`GET\` | \`/api/documents/{id}/download/\` | Stream/download the file | Authenticated |

---

#### \`POST /api/documents/\` — Upload a CV
> \`Content-Type: multipart/form-data\` — **No authentication required**

**Request Body:**
\`\`\`
file          = <PDF or DOCX file>
name          = "Mohamed Ahmed"
email         = "mohamed@example.com"
phone_number  = "01012345678"
position      = "Waiter"           # from POSITION_CHOICES list
title         = "Mohamed Ahmed CV"  # optional — auto-set from filename if empty
\`\`\`

**Response \`201 Created\`:**
\`\`\`json
{
  "id": 42,
  "user": 7,
  "title": "Mohamed Ahmed CV",
  "file": "/media/documents/cv_mohamed.pdf",
  "name": "Mohamed Ahmed",
  "email": "mohamed@example.com",
  "phone_number": "01012345678",
  "position": "Waiter",
  "status": "Pending",
  "generated_id": null,
  "created_at": "2026-03-30T21:00:00Z",
  "updated_at": "2026-03-30T21:00:00Z"
}
\`\`\`

---

#### \`POST /api/documents/{id}/set_status/\` — Approve / Reject a CV
> \`Content-Type: application/json\` | Requires Admin / HR / Recruiter token

**Request Body:**
\`\`\`json
{ "status": "Active" }
\`\`\`
> Valid values: \`"Pending"\`, \`"Active"\`, \`"Blacklist"\`

**Response \`200 OK\`:**
\`\`\`json
{
  "id": 42,
  "user": 7,
  "title": "Mohamed Ahmed CV",
  "file": "/media/documents/cv_mohamed.pdf",
  "name": "Mohamed Ahmed",
  "email": "mohamed@example.com",
  "phone_number": "01012345678",
  "position": "Waiter",
  "status": "Active",
  "generated_id": "384920174856",
  "created_at": "2026-03-30T21:00:00Z",
  "updated_at": "2026-03-30T21:05:00Z"
}
\`\`\`

> ⚡ **Side-effects when status → \`"Active"\`:**
> 1. Generates a unique 12-digit \`generated_id\` for the linked user
> 2. Syncs \`name\`, \`email\`, \`phone_number\`, \`position\` → to the \`Users\` profile
> 3. Sends a **welcome + email verification** email to the applicant

**Purpose:** Manage companies, ships, job orders, and rank/crew assignments

### 🏢 Companies — \`/api/companies/\`
**Auth:** \`IsAuthenticated\`

#### Data Fields
| Field | Source |
|---|---|
| Company name & type | \`Company.company_name\`, \`Company.company_type\` |
| Status | \`Company.status\` (Active / Inactive / Prospect) |
| Contact email | \`Company.contact_email\` |
| Website *(optional)* | \`Company.website\` |
| Country flag *(optional)* | \`Company.company_flag\` (195 country choices) |
| Hourly rate | \`Company.hourly_rate\` |
| Open positions | \`Company.open_positions\` |

#### Endpoints
| Method | Endpoint | Description |
|---|---|---|
| \`GET\` | \`/api/companies/\` | List all companies |
| \`POST\` | \`/api/companies/\` | Create a company |
| \`GET\` | \`/api/companies/{id}/\` | Get company detail |
| \`PATCH\` | \`/api/companies/{id}/\` | Update a company |
| \`DELETE\` | \`/api/companies/{id}/\` | Delete a company |
| \`GET\` | \`/api/companies/stats/\` | Aggregated statistics |

**Query Filters:** \`?name=MSC\` · \`?company_type=Shipping Manning Companies\` · \`?status=Active\`

### 🚢 Ships — \`/api/ships/\`
**Auth:** \`IsShipManagerOrAdmin\` (Admin / HR roles)

#### Data Fields
| Field | Source |
|---|---|
| Ship name & IMO | \`Ship.ship_name\`, \`Ship.imo_number\` |

| Method | Endpoint | Description |
|---|---|---|

| \`PATCH\` | \`/api/ships/{id}/\` | Update a ship |
| \`DELETE\` | \`/api/ships/{id}/\` | Delete a ship |
| \`POST\` | \`/api/ships/{id}/assign-user/\` | Add a crew member |
| \`POST\` | \`/api/ships/{id}/unassign-user/\` | Remove a crew member |

## 4. 📤 CV Submissions — \`/api/cv-submissions/\`
**Purpose:** Track job application pipeline per seafarer + company
**Auth:** \`IsAuthenticated\` (role-based inside)

### Endpoints

| Method | Endpoint | Description | Who |
|---|---|---|---|
| \`GET\` | \`/api/cv-submissions/\` | List all (lightweight) | Admin/HR/Recruiter = all · Employee = own |
| \`POST\` | \`/api/cv-submissions/\` | Create a submission | Admin/HR/Recruiter (needs \`user\`) · Employee (auto-self) |
| \`GET\` | \`/api/cv-submissions/{id}/\` | Full detail | Same as above |
| \`PATCH\` | \`/api/cv-submissions/{id}/\` | Update a submission | Admin/HR/Recruiter |
| \`DELETE\` | \`/api/cv-submissions/{id}/\` | Delete | Admin/HR/Recruiter |
| \`POST\` | \`/api/cv-submissions/upload/\` | Upload CV file only | Authenticated |
| \`PATCH\` | \`/api/cv-submissions/{id}/update-status/\` | Move through pipeline | Admin/HR/Recruiter |
| \`GET\` | \`/api/cv-submissions/stats/\` | Dashboard KPIs | All authenticated |

**Query Filters:**
\`\`\`
?status=Pending
?status=Shortlisted
?user=7                          # filter by user ID
?position=5                      # filter by rank ID
?submitted_date_from=2026-01-01
?submitted_date_to=2026-03-31
\`\`\`

---

### Full Field Reference

| Field | Type | In List | In Detail | Notes |
|---|---|---|---|---|
| \`user\` | FK → Users | ✅ | ✅ | Required for Admin, auto-set for Employee |
| \`user_name\` | String | ✅ | ✅ | Read-only |
| \`user_email\` | String | ❌ | ✅ | Read-only |
| \`company\` | FK → Company | ✅ | ✅ | Optional |
| \`position\` | FK → Rank | ✅ | ✅ | Optional |
| \`cv_file\` | File | ❌ | ✅ | Optional |
| \`cover_letter\` | Text | ❌ | ✅ | Optional |
| \`experience_years\` | Integer | ✅ | ✅ | Default \`0\` |
| \`expected_salary\` | Decimal | ❌ | ✅ | Optional |
| \`availability_date\` | Date | ❌ | ✅ | Optional |
| \`status\` | Choice | ✅ | ✅ | Default \`Pending\` |
| \`rating\` | Integer | ❌ | ✅ | Set by reviewer |
| \`reviewed_by\` | FK → Users | ❌ | ✅ | Auto-set on Approve/Reject |
| \`reviewed_date\` | Date | ❌ | ✅ | Auto-set on Approve/Reject |
| \`generated_id\` | String | ✅ | ❌ | From \`user.generated_id\` — null until Document approved |

## 7.5. 📝 Contracts — \`/api/contracts/\`
**Purpose:** Manage legal employment agreements between the Seafarer, Company, and Ship.
**Auth:** \`IsAuthenticated\` (Admin/HR = Full access, Employee = View own contracts only)

### Endpoints
| Method | Endpoint | Description |
|---|---|---|
| \`GET\` | \`/api/contracts/\` | List all contracts (lightweight format) |
| \`POST\` | \`/api/contracts/\` | Create a new contract |
| \`GET\` | \`/api/contracts/{id}/\` | Get full contract details |

| \`DELETE\` | \`/api/contracts/{id}/\` | Delete contract |
